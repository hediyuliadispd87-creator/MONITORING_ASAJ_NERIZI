<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Monitoring Ujian — Real-time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #a09d99;
    --text3: #5a5754;
    --green: #2db87e;
    --green-bg: #0d2a1e;
    --green-mid: #2db87e;
    --amber: #f5a623;
    --amber-bg: #2a1f06;
    --amber-mid: #f5a623;
    --red: #e24a4a;
    --red-bg: #2a0f0f;
    --red-mid: #e24a4a;
    --blue: #5b9cf6;
    --blue-bg: #0d1f3a;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
    --safe-top: 0;
    --safe-bottom: 0;
  }

  @supports (padding: max(0px)) {
    :root {
      --safe-top: max(0px, env(safe-area-inset-top));
      --safe-bottom: max(0px, env(safe-area-inset-bottom));
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: #0d0d0d;
    border-bottom: 1px solid var(--border);
    padding: calc(12px + var(--safe-top)) 16px 12px;
    height: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
    cursor: pointer;
    transition: background-color .2s ease;
  }

  .topbar:hover {
    background: #131313;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
    flex: 1;
  }

  .brand-dot {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: #1a1a1a;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    z-index: 2;
  }

  .brand-dot svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: var(--green);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .brand-dot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .brand-info {
    min-width: 0;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    white-space: nowrap;
    color: var(--text);
  }

  .brand-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .auto-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid rgba(45,184,126,0.2);
    padding: 4px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-mid);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .last-update {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    display: none;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.25);
  }

  .btn svg {
    width: 13px;
    height: 13px;
  }

  .btn-spinning svg {
    animation: spin .7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── MAIN CONTENT ── */
  main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── SUMMARY CARDS ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    padding: 12px 12px 8px;
    flex-shrink: 0;
  }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    box-shadow: var(--shadow);
  }

  .metric-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .metric-val {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -1px;
    color: var(--text);
  }

  .metric-val.green { color: var(--green-mid); }
  .metric-val.amber { color: var(--amber-mid); }
  .metric-val.red { color: var(--red-mid); }

  .metric-sub {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .filter-bar select,
  .filter-bar input[type=search] {
    padding: 7px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    height: 34px;
  }

  .filter-bar select option {
    background: #1a1a1a;
    color: var(--text);
  }

  .filter-bar select {
    flex: 1;
    min-width: 100px;
  }

  .filter-bar input[type=search] {
    flex: 1;
    min-width: 100px;
  }

  .filter-bar input[type=search]::placeholder {
    color: var(--text3);
  }

  .filter-bar select:focus,
  .filter-bar input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.3);
  }

  .filter-count {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    width: 100%;
    text-align: center;
    order: 10;
  }

  /* ── ROOMS GRID ── */
  .rooms-wrap {
    padding: 0 12px 12px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    width: 100%;
  }

  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 14px;
    cursor: pointer;
    transition: border-color .2s, transform .15s, box-shadow .15s;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 3;
  }

  .room-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .room-card:active {
    transform: translateY(0);
  }

  .room-card.done { border-left: 3px solid var(--green-mid); }
  .room-card.partial { border-left: 3px solid var(--amber-mid); }
  .room-card.none { border-left: 3px solid var(--red-mid); }

  .room-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }

  .room-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .room-code {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .pct-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .pct-done { background: var(--green-bg); color: var(--green); }
  .pct-partial { background: var(--amber-bg); color: var(--amber); }
  .pct-none { background: var(--red-bg); color: var(--red); }

  .progress-track {
    height: 4px;
    background: #222222;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s cubic-bezier(.34,1.56,.64,1);
  }

  .fill-done { background: var(--green-mid); }
  .fill-partial { background: var(--amber-mid); }
  .fill-none { background: var(--red-mid); }

  .room-stats {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-weight: 500;
  }

  .pill svg {
    width: 8px;
    height: 8px;
  }

  .pill-green { background: var(--green-bg); color: var(--green); }
  .pill-red { background: var(--red-bg); color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 40px 24px;
    color: var(--text3);
    grid-column: 1/-1;
  }

  .empty-state svg {
    width: 36px;
    height: 36px;
    margin-bottom: 10px;
    opacity: 0.3;
  }

  .empty-state p {
    font-size: 13px;
  }

  /* ── DETAIL PANEL ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 98;
    backdrop-filter: blur(2px);
  }

  .overlay.open {
    display: block;
  }

  .panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    background: #0d0d0d;
    border-left: 1px solid var(--border);
    z-index: 99;
    display: flex;
    flex-direction: column;
    transition: right .3s cubic-bezier(.34,1.2,.64,1);
    box-shadow: -4px 0 32px rgba(0,0,0,0.6);
  }

  .panel.open {
    right: 0;
  }

  @media (min-width: 768px) {
    .panel {
      width: 420px;
    }
  }

  .panel-head {
    padding: calc(16px + var(--safe-top)) 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }

  .panel-head-logo {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: #1a1a1a;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }

  .panel-head-logo svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--green);
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .panel-head-info h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .panel-head-info p {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .panel-mini-stats {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    padding: 0 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  .mini-stat {
    flex: 1;
    text-align: center;
    padding: 8px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .mini-stat-val {
    font-size: 16px;
    font-weight: 600;
  }

  .mini-stat-val.green { color: var(--green-mid); }
  .mini-stat-val.red { color: var(--red-mid); }
  .mini-stat-val.amber { color: var(--amber-mid); }

  .mini-stat-label {
    font-size: 9px;
    color: var(--text3);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .close-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    flex-shrink: 0;
    color: var(--text);
  }

  .close-btn:hover {
    background: #222;
    border-color: var(--border2);
  }

  .close-btn svg {
    width: 16px;
    height: 16px;
  }

  .panel-filter {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 8px;
  }

  .panel-filter input[type=search] {
    flex: 1;
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    min-width: 0;
  }

  .panel-filter input[type=search]::placeholder {
    color: var(--text3);
  }

  .panel-filter input:focus {
    outline: none;
    border-color: rgba(255,255,255,0.25);
    background: var(--surface);
  }

  .panel-filter select {
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
  }

  .panel-filter select option {
    background: #1a1a1a;
    color: var(--text);
  }

  .student-list {
    flex: 1;
    overflow-y: auto;
  }

  .student-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }

  .student-row:hover {
    background: var(--surface2);
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .av-done { background: var(--green-bg); color: var(--green); }
  .av-todo { background: var(--red-bg); color: var(--red); }

  .student-info {
    flex: 1;
    min-width: 0;
  }

  .student-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .student-meta {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-done { background: var(--green-bg); color: var(--green); }
  .badge-todo { background: var(--red-bg); color: var(--red); }

  .badge-nilai {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    color: var(--text2);
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 5px;
    margin-right: 4px;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  .panel-foot {
    padding: 8px 12px calc(8px + var(--safe-bottom));
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .export-btn {
    font-size: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    gap: 3px;
    white-space: nowrap;
  }

  .export-btn:hover {
    background: var(--surface2);
  }

  .export-btn svg {
    width: 10px;
    height: 10px;
  }

  /* ── SCROLL ── */
  ::-webkit-scrollbar {
    width: 5px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.2);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #f0ede8;
    color: #0a0a0a;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 12px;
    z-index: 200;
    transition: transform .3s cubic-bezier(.34,1.3,.64,1);
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    max-width: 90%;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }

  /* ── TABLET BREAKPOINT ── */
  @media (min-width: 768px) {
    .topbar {
      padding: 0 24px;
      height: 56px;
      flex-wrap: nowrap;
    }

    .brand-dot {
      width: 32px;
      height: 32px;
    }

    .brand-dot svg {
      width: 16px;
      height: 16px;
    }

    .brand-name {
      font-size: 15px;
    }

    .brand-sub {
      font-size: 12px;
    }

    .auto-chip {
      font-size: 12px;
      padding: 4px 10px;
    }

    .last-update {
      display: block;
      font-size: 11px;
    }

    .btn {
      padding: 7px 14px;
      font-size: 13px;
    }

    .btn svg {
      width: 15px;
      height: 15px;
    }

    .summary {
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 16px 24px;
    }

    .metric {
      padding: 16px 18px;
    }

    .metric-label {
      font-size: 11px;
    }

    .metric-val {
      font-size: 28px;
    }

    .metric-sub {
      font-size: 12px;
    }

    .filter-bar {
      padding: 0 24px 16px;
      gap: 10px;
    }

    .filter-bar select,
    .filter-bar input[type=search] {
      padding: 7px 12px;
      font-size: 13px;
      height: 34px;
    }

    .filter-count {
      width: auto;
      text-align: right;
      font-size: 12px;
      margin-left: auto;
      order: unset;
    }

    .rooms-wrap {
      padding: 0 24px 32px;
    }

    .rooms-grid {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .room-card {
      padding: 16px;
    }

    .room-name {
      font-size: 13px;
    }

    .room-code {
      font-size: 11px;
    }

    .pct-badge {
      font-size: 12px;
      padding: 2px 8px;
    }

    .pill {
      font-size: 11px;
      padding: 3px 8px;
    }

    .pill svg {
      width: 10px;
      height: 10px;
    }

    .panel {
      width: 400px;
      right: -420px;
    }

    .panel.open {
      right: 0;
    }

    .panel-head {
      padding: 16px 20px;
    }

    .panel-mini-stats {
      padding: 0 20px 12px;
      gap: 8px;
    }

    .mini-stat-val {
      font-size: 18px;
    }

    .panel-filter {
      padding: 10px 20px;
    }

    .student-row {
      padding: 11px 20px;
      gap: 12px;
    }

    .avatar {
      width: 34px;
      height: 34px;
      font-size: 11px;
    }

    .student-name {
      font-size: 13px;
    }

    .student-meta {
      font-size: 11px;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 10px;
    }

    .badge-nilai {
      font-size: 11px;
    }

    .panel-foot {
      padding: 10px 20px;
      font-size: 11px;

</style>
</head>

<script>
// ═══════════════════════════════════════════
//  KONFIGURASI — URL GAS (HARDCODED)
// ═══════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyljdsBXeGZRmqEDD8avGDFTykq7CWUVZGxpcCzoTby_Ay6CkanffGEOH19J-QPlquI/exec';

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let pesertaData = [];
let hasilData   = [];
let panelRoom   = null;
let autoTimer   = null;
let logoUrl     = null;  // Simpan URL logo dari GAS

// Demo data (dipakai jika GAS gagal)
const DEMO_ROOMS = Array.from({length:20}, (_,i) => 'Ruang ' + (i + 1));
const DEMO_NAMES = [
  'Andi Saputra','Budi Santoso','Citra Dewi','Dian Pratiwi','Eko Wahyudi',
  'Fajar Nugroho','Gita Lestari','Hendra Kurniawan','Indah Rahayu','Joko Susilo',
  'Kartika Sari','Luki Firmansyah','Maya Anggraeni','Nanda Putra','Olivia Manroe',
  'Pandu Wijaya','Qori Ramadhani','Rizki Maulana','Sinta Permata','Taufik Hidayat',
  'Ulfa Nurjannah','Vino Prasetyo','Wulan Sari','Yuni Astuti','Zahra Nabila',
  'Agus Priyono','Bagas Setiawan','Clara Angeline','Denny Kusuma','Elisa Putri'
];
const DEMO_MAPEL = ['Matematika','Bahasa Indonesia','IPA'];

function buildDemo() {
  const p = [], h = [];
  let no = 1;
  DEMO_ROOMS.forEach(r => {
    const cnt = 20 + Math.floor(Math.random() * 11);
    for (let i = 0; i < cnt; i++) {
      const mapel = DEMO_MAPEL[Math.floor(Math.random() * DEMO_MAPEL.length)];
      p.push({
        'no peserta'      : String(no).padStart(4, '0'),
        'nama'            : DEMO_NAMES[(no - 1) % DEMO_NAMES.length],
        'kelas'           : 'XII IPA ' + (Math.floor(Math.random() * 4) + 1),
        'sekolah'         : 'SMA Negeri ' + (Math.floor(Math.random() * 5) + 1),
        'kode'            : mapel.substring(0,3).toUpperCase() + '-2025',
        'mata pelajaran'  : mapel,
        'ruang'           : r
      });
      no++;
    }
  });
  const doneSet = new Set();
  p.forEach(s => { if (Math.random() < 0.62) doneSet.add(s['no peserta']); });
  doneSet.forEach(np => {
    const s = p.find(x => x['no peserta'] === np);
    if (!s) return;
    const hh = Math.floor(Math.random() * 3) + 8;
    const mm = String(Math.floor(Math.random() * 60)).padStart(2, '0');
    h.push({
      'no peserta'    : np,
      'nama'          : s.nama,
      'mata pelajaran': s['mata pelajaran'],
      'kode'          : s.kode,
      'hasil'         : Math.floor(Math.random() * 51) + 50,
      'waktu submit'  : `${hh}:${mm}`
    });
  });
  return { p, h };
}

// ═══════════════════════════════════════════
//  LOAD LOGO dari sheet Cover kolom C (header: logo)
// ═══════════════════════════════════════════
async function loadLogo() {
  try {
    // Logo dari Google Drive - format yang tepat untuk direct viewing
    logoUrl = 'https://drive.google.com/uc?export=view&id=1yTZeAuc0NtiGVd3MT_vTj1E2F4VmOLhL';
    
    // Jika ingin ambil dari GAS sheet juga, uncomment bagian ini:
    /*
    const res  = await fetch(GAS_URL + '?action=getCover');
    const json = await res.json();
    // Cari nilai kolom "logo" (case-insensitive) dari data Cover
    if (json.success && Array.isArray(json.data) && json.data.length > 0) {
      const row = json.data[0];
      const key = Object.keys(row).find(k => k.toLowerCase() === 'logo');
      if (key && row[key]) logoUrl = row[key];
    } else if (json.success && json.logo) {
      logoUrl = json.logo;
    }
    */

    if (logoUrl && typeof logoUrl === 'string' && logoUrl.startsWith('http')) {
      updateLogoBranding();
    }
  } catch (e) {
    // Jika gagal, biarkan logo default (SVG)
    console.warn('Logo load failed:', e.message);
  }
}

function updateLogoBranding() {
  // Update logo di topbar
  const brandDot = document.getElementById('brandLogo');
  if (brandDot && logoUrl) {
    brandDot.innerHTML = `<img src="${logoUrl}" alt="Logo" style="width:100%;height:100%;object-fit:contain;" onerror="this.parentElement.innerHTML='<svg viewBox=\\'0 0 24 24\\'><path d=\\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\\'/></svg>'">`;
  }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadLogo();
  loadData();
  startAutoRefresh();
  updateButtonLabels();
  window.addEventListener('resize', updateButtonLabels);
});

function updateButtonLabels() {
  const isDesktop = window.innerWidth >= 768;
  document.getElementById('refreshText').style.display = isDesktop ? 'inline' : 'none';
  const exportTexts = document.querySelectorAll('.export-text');
  exportTexts.forEach(el => el.style.display = isDesktop ? 'inline' : 'none');
}

// ═══════════════════════════════════════════
//  LOAD DATA
// ═══════════════════════════════════════════
async function loadData() {
  setRefreshState(true);

  try {
    const kode = document.getElementById('selMapel').value;
    const hasilUrl = GAS_URL + '?action=getHasil' + (kode ? '&kode=' + encodeURIComponent(kode) : '');
    const monUrl   = GAS_URL + '?action=getMonitoring' + (kode ? '&kode=' + encodeURIComponent(kode) : '');

    const [pRes, hRes] = await Promise.all([
      fetch(monUrl),
      fetch(hasilUrl)
    ]);
    const pJson = await pRes.json();
    const hJson = await hRes.json();

    if (pJson.success) pesertaData = pJson.peserta || [];
    if (hJson.success) hasilData   = hJson.hasil   || [];
    document.getElementById('lastTime').textContent = now();
    populateMapelSelect();
  } catch (e) {
    console.warn('GAS load failed, using demo data:', e.message);
    const demo = buildDemo();
    pesertaData = demo.p;
    hasilData   = demo.h;
    document.getElementById('lastTime').textContent = 'DEMO — ' + now();
  }

  renderAll();
  setRefreshState(false);
}

function now() {
  return new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function manualRefresh() {
  loadData();
}

function setRefreshState(loading) {
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  if (loading) {
    btn.classList.add('btn-spinning');
    btn.disabled = true;
  } else {
    btn.classList.remove('btn-spinning');
    btn.disabled = false;
  }
}

function startAutoRefresh() {
  clearInterval(autoTimer);
  autoTimer = setInterval(loadData, 30000);
}

// ═══════════════════════════════════════════
//  POPULATE MAPEL SELECT
// ═══════════════════════════════════════════
function populateMapelSelect() {
  const sel = document.getElementById('selMapel');
  const cur = sel.value;
  const mapels = [...new Set(pesertaData.map(r => r['mata pelajaran']).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Semua mata pelajaran</option>';
  mapels.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === cur) o.selected = true;
    sel.appendChild(o);
  });
}

// ═══════════════════════════════════════════
//  BUILD ROOM DATA
// ═══════════════════════════════════════════
function buildRooms() {
  const mapel = document.getElementById('selMapel').value;

  let peserta = pesertaData;
  if (mapel) peserta = peserta.filter(s => s['mata pelajaran'] === mapel || s['kode'] === mapel);

  const doneMap = {};
  hasilData.forEach(h => {
    if (!mapel || h['mata pelajaran'] === mapel || h['kode'] === mapel) {
      doneMap[h['no peserta']] = h;
    }
  });

  const roomMap = {};
  peserta.forEach(s => {
    const r = s['ruang'] || 'Tanpa Ruang';
    if (!roomMap[r]) roomMap[r] = { ruang: r, siswa: [] };
    roomMap[r].siswa.push(s);
  });

  const rooms = Object.values(roomMap).map(r => {
    const done  = r.siswa.filter(s => doneMap[s['no peserta']]);
    const todo  = r.siswa.filter(s => !doneMap[s['no peserta']]);
    const pct   = r.siswa.length ? Math.round(done.length / r.siswa.length * 100) : 0;
    const nilaiArr = done.map(s => Number((doneMap[s['no peserta']] || {}).hasil) || 0).filter(n => n > 0);
    const rataRoom = nilaiArr.length ? Math.round(nilaiArr.reduce((a,b) => a+b, 0) / nilaiArr.length) : 0;
    return { ruang: r.ruang, siswa: r.siswa, done, todo, pct, doneMap, rataRoom };
  });

  rooms.sort((a, b) => {
    const na = a.ruang.replace(/\D/g,'').padStart(5,'0') + a.ruang;
    const nb = b.ruang.replace(/\D/g,'').padStart(5,'0') + b.ruang;
    return na.localeCompare(nb);
  });

  return rooms;
}

// ═══════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════
function renderAll() {
  populateMapelSelect();
  const rooms  = buildRooms();
  const total  = rooms.reduce((s, r) => s + r.siswa.length, 0);
  const done   = rooms.reduce((s, r) => s + r.done.length, 0);
  const todo   = total - done;
  const pct    = total ? Math.round(done / total * 100) : 0;

  const nilaiAll = hasilData.map(h => Number(h.hasil) || 0).filter(n => n > 0);
  const rata     = nilaiAll.length ? Math.round(nilaiAll.reduce((a,b)=>a+b,0)/nilaiAll.length) : 0;

  document.getElementById('mTotal').textContent = total.toLocaleString('id');
  document.getElementById('mMapel').textContent = rooms.length + ' ruangan';
  document.getElementById('mDone').textContent  = done.toLocaleString('id');
  document.getElementById('mTodo').textContent  = todo.toLocaleString('id');
  document.getElementById('mPct').textContent   = pct + '%';
  document.getElementById('mRata').textContent  = 'Rata nilai: ' + (rata || '—');

  applyFilter();

  if (panelRoom) {
    const updated = rooms.find(r => r.ruang === panelRoom.ruang);
    if (updated) { panelRoom = updated; renderStudentList(); }
  }
}

// ═══════════════════════════════════════════
//  FILTER & RENDER ROOMS
// ═══════════════════════════════════════════
function applyFilter() {
  const rooms = buildRooms();
  const q     = (document.getElementById('searchRoom').value || '').toLowerCase();
  const sf    = document.getElementById('selStatus').value;

  const filtered = rooms.filter(r => {
    if (q && !r.ruang.toLowerCase().includes(q)) return false;
    if (sf === 'done'    && r.pct < 100)             return false;
    if (sf === 'partial' && (r.pct === 0 || r.pct === 100)) return false;
    if (sf === 'none'    && r.pct > 0)               return false;
    return true;
  });

  document.getElementById('filterCount').textContent =
    filtered.length < rooms.length
      ? `Menampilkan ${filtered.length} dari ${rooms.length} ruangan`
      : `${rooms.length} ruangan`;

  renderRooms(filtered);
}

function renderRooms(rooms) {
  const grid = document.getElementById('roomsGrid');

  if (!rooms || rooms.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>Tidak ada ruangan yang cocok</p>
    </div>`;
    return;
  }

  grid.innerHTML = rooms.map(r => {
    const cls  = r.pct === 100 ? 'done' : r.pct === 0 ? 'none' : 'partial';
    const pcls = r.pct === 100 ? 'pct-done' : r.pct === 0 ? 'pct-none' : 'pct-partial';
    const fcls = r.pct === 100 ? 'fill-done' : r.pct === 0 ? 'fill-none' : 'fill-partial';
    const mapel = r.siswa[0] ? (r.siswa[0]['mata pelajaran'] || '') : '';

    return `<div class="room-card ${cls}" role="listitem" tabindex="0"
               onclick='openPanel(${JSON.stringify({ruang:r.ruang})})'
               onkeydown="if(event.key==='Enter')openPanel({ruang:'${r.ruang.replace(/'/g,"\\'")}'})"
               aria-label="${r.ruang}: ${r.pct}% selesai, ${r.done.length} selesai dari ${r.siswa.length}">
      <div class="room-header">
        <div>
          <div class="room-name">${r.ruang}</div>
          <div class="room-code">${mapel}</div>
        </div>
        <span class="pct-badge ${pcls}">${r.pct}%</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuenow="${r.pct}" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-fill ${fcls}" style="width:${r.pct}%"></div>
      </div>
      <div class="room-stats">
        <span class="pill pill-green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          ${r.done.length}
        </span>
        <span class="pill pill-red">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${r.todo.length}
        </span>
        ${r.rataRoom ? `<span class="pill" style="background:var(--blue-bg);color:var(--blue)">∅ ${r.rataRoom}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  PANEL DETAIL
// ═══════════════════════════════════════════
function openPanel(ref) {
  const rooms = buildRooms();
  const r     = rooms.find(x => x.ruang === ref.ruang);
  if (!r) return;
  panelRoom = r;

  document.getElementById('panelTitle').textContent = r.ruang;
  document.getElementById('panelSub').textContent   = (r.siswa[0] || {})['mata pelajaran'] || '';
  document.getElementById('psTotal').textContent    = r.siswa.length;
  document.getElementById('psDone').textContent     = r.done.length;
  document.getElementById('psTodo').textContent     = r.todo.length;
  document.getElementById('psRata').textContent     = r.rataRoom || '—';

  // Update logo di panel
  const panelLogo = document.getElementById('panelLogo');
  if (panelLogo && logoUrl) {
    panelLogo.innerHTML = `<img src="${logoUrl}" alt="Logo" style="width:100%;height:100%;object-fit:contain;" onerror="this.innerHTML='<svg viewBox=\\'0 0 24 24\\'><path d=\\'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5\\'/></svg>'">`;
  }

  document.getElementById('panelSearch').value = '';
  document.getElementById('panelStatus').value = '';

  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detailPanel').setAttribute('aria-hidden', 'false');
  document.getElementById('panelSearch').focus();
  renderStudentList();
}

function closePanel() {
  panelRoom = null;
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detailPanel').setAttribute('aria-hidden', 'true');
}

function renderStudentList() {
  if (!panelRoom) return;
  const q  = (document.getElementById('panelSearch').value || '').toLowerCase();
  const sf = document.getElementById('panelStatus').value;

  let list = panelRoom.siswa.filter(s => {
    const match = !q ||
      s.nama.toLowerCase().includes(q) ||
      String(s['no peserta']).includes(q) ||
      (s.kelas || '').toLowerCase().includes(q);
    if (!match) return false;
    const done = !!panelRoom.doneMap[s['no peserta']];
    if (sf === 'done' && !done) return false;
    if (sf === 'todo' &&  done) return false;
    return true;
  });

  list = list.sort((a, b) => {
    const da = !!panelRoom.doneMap[a['no peserta']];
    const db = !!panelRoom.doneMap[b['no peserta']];
    if (da !== db) return da ? 1 : -1;
    return a.nama.localeCompare(b.nama, 'id');
  });

  document.getElementById('panelCount').textContent = list.length + ' siswa ditampilkan';

  document.getElementById('studentList').innerHTML = list.map((s, i) => {
    const done = !!panelRoom.doneMap[s['no peserta']];
    const h    = panelRoom.doneMap[s['no peserta']] || {};
    const init = s.nama.split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
    const waktu = h['waktu submit'] ? h['waktu submit'] : '';

    return `<div class="student-row" role="listitem">
      <div class="avatar ${done ? 'av-done' : 'av-todo'}" aria-hidden="true">${init}</div>
      <div class="student-info">
        <div class="student-name">${s.nama}</div>
        <div class="student-meta">${s['no peserta']} · ${s.kelas || ''}${waktu ? ' · ' + waktu : ''}</div>
      </div>
      ${done && h.hasil ? `<span class="badge-nilai">${h.hasil}</span>` : ''}
      <span class="status-badge ${done ? 'badge-done' : 'badge-todo'}">${done ? 'Selesai' : 'Belum'}</span>
    </div>`;
  }).join('') || '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px;">Tidak ada data</div>';
}

// ═══════════════════════════════════════════
//  GO TO HOME — Reset ke halaman utama
// ═══════════════════════════════════════════
function goToHome() {
  // Tutup panel jika terbuka
  closePanel();
  
  // Reset semua filter ke nilai awal
  document.getElementById('selMapel').value = '';
  document.getElementById('searchRoom').value = '';
  document.getElementById('selStatus').value = '';
  document.getElementById('panelSearch').value = '';
  document.getElementById('panelStatus').value = '';
  
  // Render ulang dengan data lengkap
  renderAll();
}

// ═══════════════════════════════════════════
//  EXPORT CSV
// ═══════════════════════════════════════════
function exportCSV() {
  if (!panelRoom) return;
  const header = ['No Peserta','Nama','Kelas','Sekolah','Ruang','Status','Nilai','Waktu Submit'];
  const rows = panelRoom.siswa.map(s => {
    const done = !!panelRoom.doneMap[s['no peserta']];
    const h    = panelRoom.doneMap[s['no peserta']] || {};
    return [
      s['no peserta'], s.nama, s.kelas || '', s.sekolah || '', s.ruang || '',
      done ? 'Selesai' : 'Belum', h.hasil || '', h['waktu submit'] || ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv  = [header.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = panelRoom.ruang.replace(/\s/g,'_') + '_monitoring.csv';
  a.click(); URL.revokeObjectURL(url);
  showToast('CSV diunduh: ' + a.download);
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
